# docker-compose.yml — AdamoServices Partner Manager
# Base de datos PostgreSQL para desarrollo local.
# La aplicación se ejecuta directamente con: streamlit run app/main.py
# En producción, Railway gestiona tanto la app como la BD.
#
# Uso:
#   docker compose up -d postgres   # Levantar BD en background
#   docker compose down             # Detener
#   docker compose down -v          # Detener y borrar datos de la BD

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: adamo_postgres
    environment:
      POSTGRES_USER: adamo
      POSTGRES_PASSWORD: adamo_dev_2026
      POSTGRES_DB: adamoservices
    ports:
      - "5432:5432"           # Accesible desde host (pgAdmin, DBeaver, psql)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adamo -d adamoservices"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    name: adamo_postgres_data
